<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Login — OG WEB SOLUTIONS</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #080808; --surface: #111111; --gold: #d4af37; --gold2: #f0c040;
      --gold-dim: rgba(212,175,55,0.12); --gold-border: rgba(212,175,55,0.25);
      --text: #f5f0e8; --muted: #888880; --border: #1f1f1f;
    }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }
    body::before {
      content: '';
      position: absolute;
      width: 600px; height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(212,175,55,0.07) 0%, transparent 70%);
      top: -100px; right: -100px;
      pointer-events: none;
    }
    body::after {
      content: '';
      position: absolute;
      width: 400px; height: 400px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(212,175,55,0.05) 0%, transparent 70%);
      bottom: -100px; left: -100px;
      pointer-events: none;
    }
    .login-box {
      background: var(--surface);
      border: 1px solid var(--gold-border);
      border-radius: 24px;
      padding: 3rem 2.5rem;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 30px 80px rgba(0,0,0,0.5), 0 0 60px rgba(212,175,55,0.05);
      position: relative;
      z-index: 1;
    }
    .login-logo {
      text-align: center;
      font-family: 'Playfair Display', serif;
      font-size: 2.2rem;
      font-weight: 900;
      margin-bottom: 0.3rem;
    }
    .login-logo span { color: var(--gold); text-shadow: 0 0 20px rgba(212,175,55,0.4); }
    .login-sub {
      text-align: center;
      color: var(--muted);
      font-size: 0.85rem;
      margin-bottom: 2.5rem;
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    .gold-divider {
      width: 50px; height: 2px;
      background: linear-gradient(90deg, var(--gold), var(--gold2));
      margin: 0.6rem auto 2rem;
      border-radius: 2px;
    }
    .fg { display: flex; flex-direction: column; gap: 0.4rem; margin-bottom: 1.2rem; }
    .fg label { font-size: 0.8rem; font-weight: 600; color: var(--muted); letter-spacing: 0.5px; text-transform: uppercase; }
    .input-wrap { position: relative; }
    .input-wrap i {
      position: absolute;
      left: 1rem; top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      font-size: 0.9rem;
    }
    .fg input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.85rem 1rem 0.85rem 2.8rem;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 0.92rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .fg input:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(212,175,55,0.1);
    }
    .btn-login {
      width: 100%;
      background: linear-gradient(135deg, var(--gold), #c8960c);
      color: #000;
      border: none;
      border-radius: 50px;
      padding: 0.9rem;
      font-family: 'Inter', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      margin-top: 0.5rem;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 20px rgba(212,175,55,0.3);
      display: flex; align-items: center; justify-content: center; gap: 0.5rem;
    }
    .btn-login:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(212,175,55,0.4); }
    .error-msg {
      color: #e74c3c;
      font-size: 0.85rem;
      text-align: center;
      margin-top: 1rem;
      min-height: 1.2rem;
    }
    .back-link {
      display: block;
      text-align: center;
      margin-top: 1.5rem;
      color: var(--muted);
      font-size: 0.82rem;
      text-decoration: none;
      transition: color 0.2s;
    }
    .back-link:hover { color: var(--gold); }
    .back-link i { margin-right: 0.3rem; }
  </style>
</head>
<body>
  <div class="login-box">
    <div class="login-logo">OG WEB SOLUTIONS<span>.</span></div>
    <div class="gold-divider"></div>
    <p class="login-sub"><i class="fa-solid fa-lock" style="color:var(--gold);margin-right:0.4rem"></i>Admin Panel</p>
    <form onsubmit="doLogin(event)">
      <div class="fg">
        <label>Username</label>
        <div class="input-wrap">
          <i class="fa-solid fa-user"></i>
          <input type="text" id="username" placeholder="Enter username" required/>
        </div>
      </div>
      <div class="fg">
        <label>Password</label>
        <div class="input-wrap">
          <i class="fa-solid fa-key"></i>
          <input type="password" id="password" placeholder="Enter password" required/>
        </div>
      </div>
      <button type="submit" class="btn-login"><i class="fa-solid fa-right-to-bracket"></i> Login</button>
      <p class="error-msg" id="errMsg"></p>
    </form>
    <a href="index.html" class="back-link"><i class="fa-solid fa-arrow-left"></i> Back to Website</a>
  </div>

  <script>
    function doLogin(e) {
      e.preventDefault();
      const u = document.getElementById('username').value;
      const p = document.getElementById('password').value;
      const savedPass = localStorage.getItem('ogAdminPass') || 'og@2025';
      if (u === 'admin' && p === savedPass) {
        sessionStorage.setItem('ogAdmin', 'true');
        window.location.href = 'admin.html';
      } else {
        document.getElementById('errMsg').textContent = '❌ Invalid username or password.';
      }
    }
  </script>
</body>
</html>
